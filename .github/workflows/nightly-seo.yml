name: Nightly SEO/AEO improvement + report

# Runs every night at 04:00 UTC.
# 04:00 UTC ≈ midnight Eastern / 9pm Pacific / 5am Paris.
# Change the cron to suit your timezone.
#
# What this workflow does each night:
#   1. Fetches 28 days of search analytics from Google Search Console
#   2. Sends GSC data to Claude, which writes new FAQs / improves meta description
#   3. Runs scripts/nightly-improve.js — deterministic SEO/AEO refresh
#      (sitemap lastmod, JSON-LD dateModified, visible "Last updated", llms.txt)
#   4. Runs scripts/morning-report.js — audit + report + Telegram delivery
#   5. Commits all changes and pushes back to main
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN            — Telegram bot token used to DM you the report
#   TELEGRAM_CHAT_ID              — comma-separated chat IDs (you + co-recipients)
#   GCP_WORKLOAD_IDENTITY_PROVIDER — WIF provider resource name (no JSON key needed)
#   GCP_SERVICE_ACCOUNT           — gsc-reader@terminaljetaime.iam.gserviceaccount.com
#   GSC_SITE_URL                  — GSC property URL, e.g. sc-domain:terminaljetaime.com
#   ANTHROPIC_API_KEY             — Claude API key (console.anthropic.com/settings/keys)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write   # needed for Workload Identity Federation

env:
  # Opt in to Node.js 24 for action runtimes (becomes default June 2026).
  # Silences the actions/checkout + actions/setup-node deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        continue-on-error: true

      - name: Fetch Google Search Console data
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: node scripts/gsc-fetch.js
        continue-on-error: true

      - name: AI-powered search analysis & improvements
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/gsc-improve.js
        continue-on-error: true

      - name: Apply deterministic SEO/AEO improvements
        run: node scripts/nightly-improve.js

      - name: Generate report + send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/morning-report.js --force

      - name: Commit & push tonight's changes
        run: |
          git config user.name "nightly-seo-bot"
          git config user.email "bot@terminaljetaime.com"
          # Stage anything the scripts touched
          git add public/ reports/ data/ || true
          if [[ -n "$(git diff --cached --name-only)" ]]; then
            git commit -m "nightly: SEO/AEO + GSC analysis $(date -u +%F)"
            git push
          else
            echo "Nothing to commit."
          fi
