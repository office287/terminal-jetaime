name: Daily traffic report

# Runs every morning at 07:00 UTC.
# Fetches Railway logs, generates a PDF, sends via Telegram.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN   — Telegram bot API token
#   TELEGRAM_CHAT_ID     — comma-separated chat IDs
#   RAILWAY_TOKEN        — Railway API token (for `railway logs`)
#   RAILWAY_SERVICE_ID   — Railway service ID for terminal-jetaime

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  traffic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Run daily traffic report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: node scripts/daily-report.js
