name: Daily traffic report

# Runs every morning at 07:00 UTC.
# Reads visits from the live site's /__stats endpoint, generates a PDF, sends via Telegram.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN   — Telegram bot API token
#   TELEGRAM_CHAT_ID     — comma-separated chat IDs
#   STATS_TOKEN          — shared secret matching the server's STATS_TOKEN env var
#   STATS_URL            — optional; live site base URL (default https://terminaljetaime.com)

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to report (YYYY-MM-DD). Leave blank for yesterday.'
        required: false
        default: ''

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  traffic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run daily traffic report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATS_URL: ${{ secrets.STATS_URL }}
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: node scripts/daily-report.js ${{ github.event.inputs.date }}
