name: Morning SEO/AEO report

on:
  schedule:
    # Every day at 07:00 UTC — adjust if you want a different morning timezone.
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate today's report
        run: node scripts/morning-report.js

      - name: Commit & push (only if a new report was written)
        run: |
          git config user.name "morning-report-bot"
          git config user.email "bot@terminaljetaime.com"
          if [[ -n "$(git status --porcelain reports/)" ]]; then
            git add reports/
            git commit -m "report: $(date -u +%F) morning audit"
            git push
          else
            echo "No new report to commit."
          fi
